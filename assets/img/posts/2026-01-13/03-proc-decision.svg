<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" style="font-family:sans-serif;background:#1a1a2e;">
  <text x="400" y="34" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="bold">Proc Decision — Per Swing Logic</text>

  <defs>
    <marker id="y" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7affc0"/>
    </marker>
    <marker id="n" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05c5c"/>
    </marker>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e0e0e0"/>
    </marker>
  </defs>

  <!-- Hit registered -->
  <rect x="310" y="54" width="180" height="40" rx="6" fill="#2a4a3a"/>
  <text x="400" y="79" text-anchor="middle" fill="#7affc0" font-size="12" font-weight="bold">Combo hit lands</text>

  <line x1="400" y1="98" x2="400" y2="128" stroke="#e0e0e0" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Drain mana -->
  <rect x="290" y="132" width="220" height="40" rx="6" fill="#3a2a1a"/>
  <text x="400" y="157" text-anchor="middle" fill="#ffaa60" font-size="12">Apply mana drain to self</text>

  <line x1="400" y1="176" x2="400" y2="206" stroke="#e0e0e0" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Proc roll diamond -->
  <polygon points="400,210 490,248 400,286 310,248" fill="#2a2a4a" stroke="#7aadff" stroke-width="1.5"/>
  <text x="400" y="244" text-anchor="middle" fill="#c0c8e0" font-size="12">rand() &lt; 0.25?</text>
  <text x="400" y="262" text-anchor="middle" fill="#909ab0" font-size="10">(configurable)</text>

  <!-- NO path -->
  <line x1="310" y1="248" x2="180" y2="248" stroke="#e05c5c" stroke-width="1.5" marker-end="url(#n)"/>
  <text x="244" y="238" text-anchor="middle" fill="#e05c5c" font-size="10">NO</text>
  <rect x="60" y="230" width="116" height="36" rx="4" fill="#1a1a1a"/>
  <text x="118" y="253" text-anchor="middle" fill="#606060" font-size="11">Nothing extra</text>

  <!-- YES path -->
  <line x1="490" y1="248" x2="580" y2="248" stroke="#7affc0" stroke-width="1.5" marker-end="url(#y)"/>
  <text x="537" y="238" text-anchor="middle" fill="#7affc0" font-size="10">YES</text>

  <!-- Pick random spell -->
  <rect x="584" y="210" width="176" height="76" rx="6" fill="#3a1a3a"/>
  <text x="672" y="234" text-anchor="middle" fill="#c0a0ff" font-size="11" font-weight="bold">Pick random spell</text>
  <text x="672" y="254" text-anchor="middle" fill="#c0c8e0" font-size="11">🔥 Fireball</text>
  <text x="672" y="272" text-anchor="middle" fill="#c0c8e0" font-size="11">⚡ LightningStrike</text>

  <!-- Fire event -->
  <line x1="672" y1="290" x2="672" y2="306" stroke="#c0a0ff" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="672" y="316" text-anchor="middle" fill="#c0a0ff" font-size="11">→ instant cast on hit target</text>

  <text x="310" y="312" text-anchor="middle" fill="#606080" font-size="11">[ placeholder — replace with damage number / proc VFX screenshot ]</text>
</svg>
