<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" style="font-family:sans-serif;background:#1a1a2e;">
  <text x="400" y="38" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="bold">Step 1 — Base Body Prep &amp; Export (Blender → MD)</text>

  <!-- Blender box -->
  <rect x="60" y="80" width="200" height="130" rx="8" fill="#2a3a5a"/>
  <text x="160" y="108" text-anchor="middle" fill="#7aadff" font-size="13" font-weight="bold">Blender</text>
  <text x="160" y="132" text-anchor="middle" fill="#c0c8e0" font-size="12">Base Body Avatar</text>
  <text x="160" y="152" text-anchor="middle" fill="#909ab0" font-size="11">T-pose / A-pose</text>
  <text x="160" y="170" text-anchor="middle" fill="#909ab0" font-size="11">Scale confirmed</text>
  <text x="160" y="190" text-anchor="middle" fill="#c0c8e0" font-size="11">→ FBX Export</text>

  <!-- Arrow -->
  <line x1="265" y1="145" x2="355" y2="145" stroke="#e0e0e0" stroke-width="2" marker-end="url(#a1)"/>
  <text x="310" y="136" text-anchor="middle" fill="#909ab0" font-size="11">FBX</text>
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e0e0e0"/>
    </marker>
  </defs>

  <!-- MD box -->
  <rect x="360" y="80" width="200" height="130" rx="8" fill="#2a4a3a"/>
  <text x="460" y="108" text-anchor="middle" fill="#7affc0" font-size="13" font-weight="bold">Marvelous Designer</text>
  <text x="460" y="132" text-anchor="middle" fill="#c0c8e0" font-size="12">Import Avatar</text>
  <text x="460" y="155" text-anchor="middle" fill="#909ab0" font-size="11">Auto Scale enabled</text>
  <text x="460" y="175" text-anchor="middle" fill="#e05c5c" font-size="11">⚠ Scale mismatch = all wrong</text>

  <text x="400" y="270" text-anchor="middle" fill="#606080" font-size="11">[ placeholder — replace with Blender viewport + MD import screenshot ]</text>
</svg>
