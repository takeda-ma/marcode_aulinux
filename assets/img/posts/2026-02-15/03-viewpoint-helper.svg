<svg xmlns="http://www.w3.org/2000/svg" width="800" height="310" style="font-family:sans-serif;background:#1a1a2e;">
  <text x="400" y="36" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="bold">GetAbilityViewOrigin — Unified Viewpoint Helper</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e0e0e0"/>
    </marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7aadff"/>
    </marker>
    <marker id="c" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7affc0"/>
    </marker>
  </defs>

  <!-- Helper box -->
  <rect x="290" y="68" width="220" height="64" rx="8" fill="#3a3a2a"/>
  <text x="400" y="96" text-anchor="middle" fill="#ffdd7a" font-size="13" font-weight="bold">GetAbilityViewOrigin()</text>
  <text x="400" y="118" text-anchor="middle" fill="#909ab0" font-size="11">shared utility on base ability class</text>

  <!-- Player path -->
  <line x1="290" y1="90" x2="200" y2="145" stroke="#7aadff" stroke-width="1.5" marker-end="url(#b)"/>
  <rect x="40" y="148" width="220" height="52" rx="6" fill="#2a3a5a"/>
  <text x="150" y="172" text-anchor="middle" fill="#7aadff" font-size="12" font-weight="bold">Player path</text>
  <text x="150" y="190" text-anchor="middle" fill="#c0c8e0" font-size="11">PlayerController::GetPlayerViewPoint</text>
  <text x="150" y="218" text-anchor="middle" fill="#909ab0" font-size="10">Camera position &amp; rotation</text>

  <!-- AI path -->
  <line x1="510" y1="90" x2="600" y2="145" stroke="#7affc0" stroke-width="1.5" marker-end="url(#c)"/>
  <rect x="540" y="148" width="220" height="52" rx="6" fill="#2a4a3a"/>
  <text x="650" y="172" text-anchor="middle" fill="#7affc0" font-size="12" font-weight="bold">AI path</text>
  <text x="650" y="190" text-anchor="middle" fill="#c0c8e0" font-size="11">AvatarActor::GetActorEyesViewPoint</text>
  <text x="650" y="218" text-anchor="middle" fill="#909ab0" font-size="10">Character eye pos · already faces target</text>

  <!-- Both converge to same result -->
  <line x1="150" y1="200" x2="340" y2="255" stroke="#7aadff" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="650" y1="200" x2="460" y2="255" stroke="#7affc0" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="270" y="258" width="260" height="34" rx="6" fill="#2a2a3a"/>
  <text x="400" y="280" text-anchor="middle" fill="#e0e0e0" font-size="12">OutLocation + OutRotation</text>
  <text x="400" y="296" text-anchor="middle" fill="#606080" font-size="10">same output · same downstream ability logic</text>
</svg>
