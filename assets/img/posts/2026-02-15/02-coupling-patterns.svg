<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" style="font-family:sans-serif;background:#1a1a2e;">
  <text x="400" y="36" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="bold">3 Player-Controller Dependencies in Abilities</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05c5c"/>
    </marker>
  </defs>

  <!-- Ability box -->
  <rect x="50" y="80" width="180" height="160" rx="8" fill="#2a3a5a"/>
  <text x="140" y="106" text-anchor="middle" fill="#7aadff" font-size="13" font-weight="bold">Gameplay Ability</text>
  <text x="140" y="132" text-anchor="middle" fill="#c0c8e0" font-size="11">HitScan</text>
  <text x="140" y="152" text-anchor="middle" fill="#c0c8e0" font-size="11">Projectile</text>
  <text x="140" y="172" text-anchor="middle" fill="#c0c8e0" font-size="11">LockAim</text>
  <text x="140" y="192" text-anchor="middle" fill="#c0c8e0" font-size="11">FocusRoll</text>
  <text x="140" y="212" text-anchor="middle" fill="#c0c8e0" font-size="11">Teleport</text>

  <!-- PlayerController box -->
  <rect x="550" y="60" width="200" height="190" rx="8" fill="#3a2020"/>
  <text x="650" y="86" text-anchor="middle" fill="#ff9a7a" font-size="13" font-weight="bold">PlayerController</text>

  <!-- P1 arrow -->
  <line x1="232" y1="115" x2="548" y2="100" stroke="#e05c5c" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="290" y="90" width="220" height="22" rx="3" fill="#2a1010"/>
  <text x="400" y="105" text-anchor="middle" fill="#ffaaaa" font-size="11">P1: GetPlayerViewPoint() — camera origin</text>

  <!-- P2 arrow -->
  <line x1="232" y1="160" x2="548" y2="160" stroke="#e05c5c" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="290" y="148" width="220" height="22" rx="3" fill="#2a1010"/>
  <text x="400" y="163" text-anchor="middle" fill="#ffaaaa" font-size="11">P2: GetCurrentHighlightedActor() — lock target</text>

  <!-- P3 arrow -->
  <line x1="232" y1="205" x2="548" y2="220" stroke="#e05c5c" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="290" y="208" width="220" height="22" rx="3" fill="#2a1010"/>
  <text x="400" y="223" text-anchor="middle" fill="#ffaaaa" font-size="11">P3: ConsumePendingRollDirection() — input dir</text>

  <!-- PC internals -->
  <text x="650" y="120" text-anchor="middle" fill="#909ab0" font-size="11">Camera manager</text>
  <text x="650" y="140" text-anchor="middle" fill="#909ab0" font-size="11">Input system</text>
  <text x="650" y="160" text-anchor="middle" fill="#909ab0" font-size="11">Cursor / highlight</text>
  <text x="650" y="180" text-anchor="middle" fill="#909ab0" font-size="11">Prediction logic</text>
  <text x="650" y="200" text-anchor="middle" fill="#909ab0" font-size="11">UI ownership</text>
  <text x="650" y="225" text-anchor="middle" fill="#e05c5c" font-size="10">❌ AI has none of these</text>

  <text x="400" y="296" text-anchor="middle" fill="#606080" font-size="11">[ placeholder — replace with ability code / cast screenshot ]</text>
</svg>
