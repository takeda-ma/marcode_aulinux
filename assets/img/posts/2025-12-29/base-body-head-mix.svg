<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" style="font-family:sans-serif;background:#1a1a2e;">
  <text x="400" y="40" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Base Body + Base Head Mix &amp; Match</text>

  <!-- Head A -->
  <rect x="80" y="80" width="120" height="120" rx="60" fill="#4a90d9" opacity="0.8"/>
  <text x="140" y="148" text-anchor="middle" fill="#fff" font-size="13">Head A</text>

  <!-- Head B -->
  <rect x="240" y="80" width="120" height="120" rx="60" fill="#7b68d9" opacity="0.8"/>
  <text x="300" y="148" text-anchor="middle" fill="#fff" font-size="13">Head B</text>

  <!-- Body -->
  <rect x="80" y="220" width="280" height="100" rx="8" fill="#3a7a5a" opacity="0.8"/>
  <text x="220" y="277" text-anchor="middle" fill="#fff" font-size="13">Base Body (shared)</text>

  <!-- Arrow -->
  <line x1="460" y1="180" x2="530" y2="180" stroke="#e0e0e0" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e0e0e0"/>
    </marker>
  </defs>

  <!-- Result character -->
  <rect x="540" y="80" width="120" height="120" rx="60" fill="#4a90d9" opacity="0.8"/>
  <rect x="540" y="220" width="120" height="100" rx="8" fill="#3a7a5a" opacity="0.8"/>
  <text x="600" y="148" text-anchor="middle" fill="#fff" font-size="13">Head A</text>
  <text x="600" y="277" text-anchor="middle" fill="#fff" font-size="12">Base Body</text>
  <text x="600" y="338" text-anchor="middle" fill="#606080" font-size="11">Result Character</text>

  <text x="400" y="355" text-anchor="middle" fill="#606080" font-size="11">[ placeholder — replace with actual Blender / UE5 screenshot ]</text>
</svg>
